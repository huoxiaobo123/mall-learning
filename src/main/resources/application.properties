spring.application.name=mall-learning
server.port=8081

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/mall_learning?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis-Plus
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.configuration.map-underscore-to-camel-case=true

# Redis (暂时注释掉：还没启动)
# spring.data.redis.host=localhost
# spring.data.redis.port=6379

# ============================================
# RabbitMQ 完整配置
# ============================================
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# ★★★ 生产者确认（面试必考）
#   correlated = 每条消息确认时带 correlationId，知道哪条消息成功了/失败了
#   如果不开启，生产者发完就不知道消息到了没有
spring.rabbitmq.publisher-confirm-type=correlated
# ★★★ 消息路由失败时回调
#   如果交换机到队列的路由失败了，RabbitMQ 通知生产者
spring.rabbitmq.publisher-returns=true

# ★★★ 消费者重试（面试必考）
#   开启重试后，消费者处理失败会重试 N 次
#   重试完还失败 → 进入死信队列（如果配置了 DLQ）
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=1000
# ★★★ 手动 ACK 模式（默认 auto=自动确认）
#   auto 模式下，方法不抛异常就算成功
#   手动模式需要显式调用 channel.basicAck()
spring.rabbitmq.listener.simple.acknowledge-mode=auto
